<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ژورنال فارکس</title>
<link rel="icon" href="data:,">
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body style="margin:0;">
<div id="root"></div>
<script type="text/babel" data-presets="react">
const { useState, useEffect, useMemo, useCallback } = React;

/* ----------------------------- ابزارهای کمکی ----------------------------- */

const STORAGE_KEY = "fx_journal_trades_v1";
const BALANCE_KEY = "fx_journal_balance_v1";
const GOAL_KEY = "fx_journal_goal_v1";

const PAIRS = [
  "EUR/USD", "GBP/USD", "USD/JPY", "USD/CHF", "AUD/USD",
  "USD/CAD", "NZD/USD", "EUR/JPY", "GBP/JPY", "XAU/USD",
];

const uid = () => Math.random().toString(36).slice(2) + Date.now().toString(36);

function fmtMoney(n) {
  const sign = n < 0 ? "-" : n > 0 ? "+" : "";
  const abs = Math.abs(n);
  return `${sign}$${abs.toLocaleString("en-US", { maximumFractionDigits: 2, minimumFractionDigits: 2 })}`;
}

function fmtDate(iso) {
  try {
    return new Date(iso).toLocaleDateString("fa-IR", { year: "numeric", month: "2-digit", day: "2-digit" });
  } catch {
    return iso;
  }
}

function isStorageAvailable() {
  try {
    const testKey = "__fx_journal_test__";
    localStorage.setItem(testKey, "1");
    localStorage.removeItem(testKey);
    return true;
  } catch (e) {
    return false;
  }
}

/* ------------------------------ Storage hooks ------------------------------ */

function useTrades() {
  const [trades, setTrades] = useState([]);
  const [loaded, setLoaded] = useState(false);
  const [error, setError] = useState(null);

  useEffect(() => {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) setTrades(JSON.parse(raw));
    } catch (e) {
      // هنوز تریدی ذخیره نشده یا داده خراب است
    } finally {
      setLoaded(true);
    }
  }, []);

  const persist = useCallback((next) => {
    setTrades(next);
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(next));
      setError(null);
    } catch (e) {
      setError("ذخیره‌سازی ناموفق بود (شاید حافظهٔ مرورگر پر است)");
    }
  }, []);

  const addTrade = useCallback((trade) => {
    const next = [{ ...trade, id: uid(), createdAt: new Date().toISOString() }, ...trades];
    persist(next);
  }, [trades, persist]);

  const deleteTrade = useCallback((id) => {
    const next = trades.filter((t) => t.id !== id);
    persist(next);
  }, [trades, persist]);

  return { trades, loaded, error, addTrade, deleteTrade };
}

function useSettings() {
  const [balance, setBalanceState] = useState(5000);
  const [goalPct, setGoalPctState] = useState(7);
  const [loaded, setLoaded] = useState(false);

  useEffect(() => {
    try {
      const b = localStorage.getItem(BALANCE_KEY);
      if (b) setBalanceState(JSON.parse(b));
    } catch (e) {}
    try {
      const g = localStorage.getItem(GOAL_KEY);
      if (g) setGoalPctState(JSON.parse(g));
    } catch (e) {}
    setLoaded(true);
  }, []);

  const setBalance = useCallback((val) => {
    setBalanceState(val);
    try { localStorage.setItem(BALANCE_KEY, JSON.stringify(val)); } catch (e) {}
  }, []);

  const setGoalPct = useCallback((val) => {
    setGoalPctState(val);
    try { localStorage.setItem(GOAL_KEY, JSON.stringify(val)); } catch (e) {}
  }, []);

  return { balance, setBalance, goalPct, setGoalPct, loaded };
}

/* --------------------------------- آیکن‌ها --------------------------------- */

const Icon = {
  dashboard: (p) => (
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.6" {...p}>
      <rect x="3" y="3" width="7" height="9" rx="1.5" /><rect x="14" y="3" width="7" height="5" rx="1.5" />
      <rect x="14" y="12" width="7" height="9" rx="1.5" /><rect x="3" y="16" width="7" height="5" rx="1.5" />
    </svg>
  ),
  plus: (p) => (
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" {...p}>
      <path d="M12 5v14M5 12h14" strokeLinecap="round" />
    </svg>
  ),
  list: (p) => (
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.6" {...p}>
      <path d="M8 6h13M8 12h13M8 18h13M3 6h.01M3 12h.01M3 18h.01" strokeLinecap="round" />
    </svg>
  ),
  brain: (p) => (
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.6" {...p}>
      <path d="M9.5 4a2.5 2.5 0 0 0-2.5 2.5v.6A2.9 2.9 0 0 0 5 9.9v1.2a2.9 2.9 0 0 0-1 2.2A3 3 0 0 0 7 16.2V18a2.5 2.5 0 0 0 2.5 2.5M14.5 4A2.5 2.5 0 0 1 17 6.5v.6a2.9 2.9 0 0 1 2 2.8v1.2a2.9 2.9 0 0 1 1 2.2 3 3 0 0 1-3 2.9V18a2.5 2.5 0 0 1-2.5 2.5M9.5 4v16M14.5 4v16" />
    </svg>
  ),
  trash: (p) => (
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.6" {...p}>
      <path d="M4 7h16M9 7V4.6c0-.6.5-1.1 1.1-1.1h3.8c.6 0 1.1.5 1.1 1.1V7M6 7l1 13c.05.5.5 1 1 1h8c.5 0 .95-.5 1-1l1-13" strokeLinecap="round" />
    </svg>
  ),
  up: (p) => (
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" {...p}>
      <path d="M17 7L7 17M17 7H9M17 7v8" strokeLinecap="round" strokeLinejoin="round" />
    </svg>
  ),
  down: (p) => (
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" {...p}>
      <path d="M7 7l10 10M7 7v8M7 7h8" strokeLinecap="round" strokeLinejoin="round" />
    </svg>
  ),
  chart: (p) => (
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.6" {...p}>
      <path d="M3 17l5-5 4 3 6-7" strokeLinecap="round" strokeLinejoin="round" />
      <path d="M3 21h18" strokeLinecap="round" />
    </svg>
  ),
};

/* -------------------------------- نشانگرها -------------------------------- */

function CandleSignature({ trades }) {
  // یک ستون شمع که از روی ۱۲ تریدِ آخر ساخته می‌شود؛ امضای بصری صفحه
  const last = trades.slice(0, 12).reverse();
  const bars = last.length ? last : Array.from({ length: 12 }, () => null);
  return (
    <div className="candle-sig" aria-hidden="true">
      {bars.map((t, i) => {
        if (!t) return <div key={i} className="candle-sig__bar candle-sig__bar--empty" />;
        const win = Number(t.pnl) >= 0;
        const h = Math.min(100, 28 + Math.abs(Number(t.pnl)) * 1.2);
        return (
          <div
            key={i}
            className={`candle-sig__bar ${win ? "candle-sig__bar--win" : "candle-sig__bar--loss"}`}
            style={{ height: `${h}%` }}
          />
        );
      })}
    </div>
  );
}

function RingStat({ percent, label, sub }) {
  const clamped = Math.max(0, Math.min(100, percent));
  const angle = clamped * 3.6;
  return (
    <div className="ring">
      <div
        className="ring__track"
        style={{
          background: `conic-gradient(#35e3b0 ${angle}deg, rgba(255,255,255,0.06) ${angle}deg)`,
        }}
      >
        <div className="ring__dot" style={{ transform: `rotate(${angle}deg)` }}>
          <span />
        </div>
        <div className="ring__center">
          <div className="ring__value">{clamped.toFixed(0)}%</div>
          <div className="ring__label">{label}</div>
        </div>
      </div>
      {sub && <div className="ring__sub">{sub}</div>}
    </div>
  );
}

/* ------------------------------- نمودار خطی ------------------------------- */

function EquityChart({ points, goalLine, startBalance }) {
  const width = 600;
  const height = 220;
  const padding = { top: 18, right: 12, bottom: 28, left: 56 };

  const values = points.map((p) => p.value);
  const allValues = [...values, goalLine, startBalance];
  const min = Math.min(...allValues);
  const max = Math.max(...allValues);
  const span = max - min || 1;
  const padded = { min: min - span * 0.08, max: max + span * 0.08 };
  const fullSpan = padded.max - padded.min || 1;

  const innerW = width - padding.left - padding.right;
  const innerH = height - padding.top - padding.bottom;

  const xAt = (i) => padding.left + (points.length <= 1 ? innerW / 2 : (i / (points.length - 1)) * innerW);
  const yAt = (v) => padding.top + innerH - ((v - padded.min) / fullSpan) * innerH;

  const linePath = points
    .map((p, i) => `${i === 0 ? "M" : "L"} ${xAt(i).toFixed(1)} ${yAt(p.value).toFixed(1)}`)
    .join(" ");

  const areaPath =
    points.length > 0
      ? `${linePath} L ${xAt(points.length - 1).toFixed(1)} ${(padding.top + innerH).toFixed(1)} L ${xAt(0).toFixed(1)} ${(padding.top + innerH).toFixed(1)} Z`
      : "";

  const gridLines = 4;
  const gridVals = Array.from({ length: gridLines + 1 }, (_, i) => padded.min + (fullSpan * i) / gridLines);

  return (
    <svg viewBox={`0 0 ${width} ${height}`} className="equity-svg" preserveAspectRatio="none">
      <defs>
        <linearGradient id="areaFill" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor="#35e3b0" stopOpacity="0.28" />
          <stop offset="100%" stopColor="#35e3b0" stopOpacity="0" />
        </linearGradient>
      </defs>

      {gridVals.map((v, i) => (
        <g key={i}>
          <line
            x1={padding.left} x2={width - padding.right}
            y1={yAt(v)} y2={yAt(v)}
            stroke="rgba(255,255,255,0.07)" strokeWidth="1"
          />
          <text x={padding.left - 8} y={yAt(v) + 4} textAnchor="end" className="equity-axis-label">
            ${Math.round(v).toLocaleString("en-US")}
          </text>
        </g>
      ))}

      <line
        x1={padding.left} x2={width - padding.right}
        y1={yAt(goalLine)} y2={yAt(goalLine)}
        stroke="#f4b740" strokeWidth="1.5" strokeDasharray="6 5"
      />

      {areaPath && <path d={areaPath} fill="url(#areaFill)" />}
      {linePath && <path d={linePath} fill="none" stroke="#35e3b0" strokeWidth="2.4" strokeLinejoin="round" strokeLinecap="round" />}

      {points.map((p, i) => (
        <circle key={i} cx={xAt(i)} cy={yAt(p.value)} r={i === points.length - 1 ? 4 : 2.4} fill="#35e3b0" />
      ))}
    </svg>
  );
}

/* --------------------------------- بخش‌ها --------------------------------- */

function StatCard({ title, value, valueClass = "", note }) {
  return (
    <div className="card stat-card">
      <div className="stat-card__title">{title}</div>
      <div className={`stat-card__value ${valueClass}`}>{value}</div>
      {note && <div className="stat-card__note">{note}</div>}
    </div>
  );
}

function Dashboard({ trades, balance, goalPct }) {
  const stats = useMemo(() => {
    const closed = trades.filter((t) => t.pnl !== "" && t.pnl !== null && !isNaN(Number(t.pnl)));
    const wins = closed.filter((t) => Number(t.pnl) > 0);
    const losses = closed.filter((t) => Number(t.pnl) < 0);
    const winRate = closed.length ? (wins.length / closed.length) * 100 : 0;

    const rrValues = trades
      .filter((t) => t.risk && t.reward && Number(t.risk) > 0)
      .map((t) => Number(t.reward) / Number(t.risk));
    const avgRR = rrValues.length ? rrValues.reduce((a, b) => a + b, 0) / rrValues.length : null;

    const best = closed.length ? closed.reduce((a, b) => (Number(a.pnl) > Number(b.pnl) ? a : b)) : null;

    const totalPnl = closed.reduce((sum, t) => sum + Number(t.pnl), 0);

    return { closed, wins, losses, winRate, avgRR, best, totalPnl };
  }, [trades]);

  const equityPoints = useMemo(() => {
    const sorted = [...trades]
      .filter((t) => t.pnl !== "" && t.pnl !== null && !isNaN(Number(t.pnl)))
      .sort((a, b) => new Date(a.createdAt) - new Date(b.createdAt));
    let running = balance - sorted.reduce((s, t) => s + Number(t.pnl), 0);
    const pts = [{ value: running }];
    sorted.forEach((t) => {
      running += Number(t.pnl);
      pts.push({ value: running });
    });
    return pts;
  }, [trades, balance]);

  const currentBalance = balance;
  const startBalance = equityPoints.length ? equityPoints[0].value : balance;
  const growthPct = startBalance ? ((currentBalance - startBalance) / Math.abs(startBalance)) * 100 : 0;
  const goalValue = startBalance * (1 + goalPct / 100);

  return (
    <div className="grid">
      <div className="card metric-card">
        <div className="metric-card__head">متوسط R:R</div>
        <div className="metric-card__value">
          {stats.avgRR ? `1 : ${stats.avgRR.toFixed(2)}` : <span className="dash">—</span>}
        </div>
        <div className="metric-card__sub">نسبت ریسک به ریوارد</div>
      </div>

      <div className="card metric-card">
        <div className="metric-card__head">بهترین ترید</div>
        <div className={`metric-card__value ${stats.best && Number(stats.best.pnl) >= 0 ? "pos" : "neg"}`}>
          {stats.best ? fmtMoney(Number(stats.best.pnl)) : <span className="dash">—</span>}
        </div>
        <div className="metric-card__sub">{stats.best ? stats.best.pair : "—"}</div>
      </div>

      <div className="card ring-card">
        <div className="ring-card__title">WIN RATE</div>
        <RingStat percent={stats.winRate} label="Win Rate" />
        <div className="ring-card__detail">
          {stats.closed.length} تریدِ بسته‌شده · {stats.wins.length} برد · {stats.losses.length} باخت
        </div>
      </div>

      <div className="card chart-card chart-card--wide">
        <div className="chart-card__head">
          <span className={`pill ${growthPct >= 0 ? "pill--pos" : "pill--neg"}`}>
            {growthPct >= 0 ? "+" : ""}{growthPct.toFixed(1)}%
          </span>
          <span className="chart-card__title">نمودار رشد سرمایه</span>
        </div>
        <div className="chart-card__legend">
          <span className="legend-item">
            <span className="legend-swatch legend-swatch--solid" /> موجودی
          </span>
          <span className="legend-item">
            <span className="legend-swatch legend-swatch--dashed" /> هدف {goalPct}% ({fmtMoney(goalValue - startBalance)})
          </span>
        </div>
        <EquityChart points={equityPoints} goalLine={goalValue} startBalance={startBalance} />
        <div className="chart-card__footer">
          موجودی فعلی: <strong>{fmtMoney(currentBalance)}</strong>
        </div>
      </div>

      <div className="card signature-card chart-card--wide">
        <div className="chart-card__title">روند ۱۲ تریدِ اخیر</div>
        <CandleSignature trades={trades} />
        <div className="signature-card__legend">
          <span><i className="dot dot--win" /> سود</span>
          <span><i className="dot dot--loss" /> ضرر</span>
        </div>
      </div>
    </div>
  );
}

function isValidChartUrl(url) {
  if (!url) return true;
  try {
    const u = new URL(url);
    return u.protocol === "https:" || u.protocol === "http:";
  } catch {
    return false;
  }
}

function TradeForm({ onSubmit }) {
  const [form, setForm] = useState({
    pair: PAIRS[0],
    direction: "buy",
    entry: "",
    exit: "",
    risk: "",
    reward: "",
    pnl: "",
    note: "",
    chartUrl: "",
  });
  const [submitted, setSubmitted] = useState(false);
  const [urlError, setUrlError] = useState("");

  const update = (key) => (e) => setForm((f) => ({ ...f, [key]: e.target.value }));

  const handleSubmit = (e) => {
    e.preventDefault();
    try {
      if (!form.pair) return;
      if (!isValidChartUrl(form.chartUrl.trim())) {
        setUrlError("لینک وارد شده معتبر نیست");
        return;
      }
      setUrlError("");
      onSubmit({
        ...form,
        entry: form.entry === "" ? null : Number(form.entry),
        exit: form.exit === "" ? null : Number(form.exit),
        risk: form.risk === "" ? null : Number(form.risk),
        reward: form.reward === "" ? null : Number(form.reward),
        pnl: form.pnl === "" ? "" : Number(form.pnl),
        chartUrl: form.chartUrl.trim(),
      });
      setSubmitted(true);
      setForm({ pair: PAIRS[0], direction: "buy", entry: "", exit: "", risk: "", reward: "", pnl: "", note: "", chartUrl: "" });
      setTimeout(() => setSubmitted(false), 2200);
    } catch (err) {
      alert("ثبت ترید ناموفق بود: " + (err && err.message ? err.message : "خطای نامشخص"));
    }
  };

  return (
    <form className="card form-card" onSubmit={handleSubmit}>
      <h2 className="form-card__title">ثبت تریدِ جدید</h2>

      <div className="field-row">
        <label className="field">
          <span>جفت‌ارز</span>
          <select value={form.pair} onChange={update("pair")}>
            {PAIRS.map((p) => (
              <option key={p} value={p}>{p}</option>
            ))}
          </select>
        </label>

        <label className="field">
          <span>جهت</span>
          <div className="seg">
            <button
              type="button"
              className={`seg__btn ${form.direction === "buy" ? "seg__btn--active seg__btn--buy" : ""}`}
              onClick={() => setForm((f) => ({ ...f, direction: "buy" }))}
            >
              <Icon.up className="seg__icon" /> خرید
            </button>
            <button
              type="button"
              className={`seg__btn ${form.direction === "sell" ? "seg__btn--active seg__btn--sell" : ""}`}
              onClick={() => setForm((f) => ({ ...f, direction: "sell" }))}
            >
              <Icon.down className="seg__icon" /> فروش
            </button>
          </div>
        </label>
      </div>

      <div className="field-row">
        <label className="field">
          <span>قیمت ورود</span>
          <input type="number" step="any" placeholder="مثلاً 1.0850" value={form.entry} onChange={update("entry")} />
        </label>
        <label className="field">
          <span>قیمت خروج</span>
          <input type="number" step="any" placeholder="مثلاً 1.0900" value={form.exit} onChange={update("exit")} />
        </label>
      </div>

      <div className="field-row">
        <label className="field">
          <span>ریسک (واحد)</span>
          <input type="number" step="any" placeholder="مثلاً 1" value={form.risk} onChange={update("risk")} />
        </label>
        <label className="field">
          <span>ریوارد (واحد)</span>
          <input type="number" step="any" placeholder="مثلاً 2.5" value={form.reward} onChange={update("reward")} />
        </label>
      </div>

      <label className="field">
        <span>سود / ضرر (دلار)</span>
        <input type="number" step="any" placeholder="مثبت برای سود، منفی برای ضرر" value={form.pnl} onChange={update("pnl")} />
      </label>

      <label className="field">
        <span>یادداشت ترید</span>
        <textarea rows={3} placeholder="چرا وارد شدی؟ ستاپ چی بود؟ چه چیزی یاد گرفتی؟" value={form.note} onChange={update("note")} />
      </label>

      <label className="field">
        <span>لینک چارت (TradingView)</span>
        <input
          type="url"
          placeholder="https://www.tradingview.com/x/..."
          value={form.chartUrl}
          onChange={(e) => { update("chartUrl")(e); setUrlError(""); }}
        />
        {urlError && <span className="field__error">{urlError}</span>}
        {form.chartUrl && isValidChartUrl(form.chartUrl.trim()) && (
          <a href={form.chartUrl.trim()} target="_blank" rel="noopener noreferrer" className="chart-preview-link">
            مشاهدهٔ پیش‌نمایش چارت ↗
          </a>
        )}
      </label>

      <button type="submit" className="btn btn--primary">
        <Icon.plus className="btn__icon" /> ثبت ترید
      </button>

      {submitted && <div className="toast">تریدت با موفقیت ثبت و ذخیره شد ✓</div>}
    </form>
  );
}

function TradeList({ trades, onDelete }) {
  if (!trades.length) {
    return (
      <div className="card empty-state">
        <Icon.list className="empty-state__icon" />
        <p>هنوز هیچ تریدی ثبت نشده. از تب «ثبت ترید» اولین تریدت رو وارد کن.</p>
      </div>
    );
  }

  return (
    <div className="trade-list">
      {trades.map((t) => {
        const pnl = t.pnl === "" || t.pnl === null ? null : Number(t.pnl);
        const win = pnl !== null && pnl >= 0;
        return (
          <div key={t.id} className="card trade-row">
            <div className="trade-row__main">
              <div className={`trade-row__dir ${t.direction === "buy" ? "trade-row__dir--buy" : "trade-row__dir--sell"}`}>
                {t.direction === "buy" ? <Icon.up className="trade-row__dir-icon" /> : <Icon.down className="trade-row__dir-icon" />}
              </div>
              <div className="trade-row__info">
                <div className="trade-row__pair">{t.pair}</div>
                <div className="trade-row__meta">
                  {t.entry != null && t.exit != null ? `${t.entry} → ${t.exit} · ` : ""}{fmtDate(t.createdAt)}
                </div>
              </div>
            </div>
            <div className="trade-row__right">
              <div className={`trade-row__pnl ${pnl === null ? "" : win ? "pos" : "neg"}`}>
                {pnl === null ? "—" : fmtMoney(pnl)}
              </div>
              {t.risk && t.reward && (
                <div className="trade-row__rr">R:R 1:{(Number(t.reward) / Number(t.risk)).toFixed(2)}</div>
              )}
            </div>
            <button className="icon-btn" onClick={() => onDelete(t.id)} aria-label="حذف ترید">
              <Icon.trash className="icon-btn__svg" />
            </button>
            {(t.note || t.chartUrl) && (
              <div className="trade-row__extra">
                {t.note && <div className="trade-row__note">{t.note}</div>}
                {t.chartUrl && (
                  <a
                    href={t.chartUrl}
                    target="_blank"
                    rel="noopener noreferrer"
                    className="trade-row__chart-link"
                  >
                    <Icon.chart className="trade-row__chart-icon" /> مشاهدهٔ چارت در TradingView
                  </a>
                )}
              </div>
            )}
          </div>
        );
      })}
    </div>
  );
}

function Analysis({ trades }) {
  const insights = useMemo(() => {
    const closed = trades.filter((t) => t.pnl !== "" && t.pnl !== null && !isNaN(Number(t.pnl)));
    if (!closed.length) return null;

    const byPair = {};
    closed.forEach((t) => {
      byPair[t.pair] = byPair[t.pair] || { wins: 0, losses: 0, pnl: 0 };
      byPair[t.pair].pnl += Number(t.pnl);
      if (Number(t.pnl) >= 0) byPair[t.pair].wins += 1;
      else byPair[t.pair].losses += 1;
    });

    const pairsSorted = Object.entries(byPair).sort((a, b) => b[1].pnl - a[1].pnl);
    const bestPair = pairsSorted[0];
    const worstPair = pairsSorted[pairsSorted.length - 1];

    const buys = closed.filter((t) => t.direction === "buy");
    const sells = closed.filter((t) => t.direction === "sell");
    const buyWinRate = buys.length ? (buys.filter((t) => Number(t.pnl) >= 0).length / buys.length) * 100 : null;
    const sellWinRate = sells.length ? (sells.filter((t) => Number(t.pnl) >= 0).length / sells.length) * 100 : null;

    return { bestPair, worstPair, buyWinRate, sellWinRate, count: closed.length };
  }, [trades]);

  return (
    <div className="card analysis-card">
      <div className="analysis-card__head">
        <Icon.brain className="analysis-card__icon" />
        <h2>تحلیل AI</h2>
      </div>

      {!insights ? (
        <p className="analysis-card__empty">
          برای دریافت تحلیل، حداقل چند تریدِ بسته‌شده (با سود/ضرر مشخص) ثبت کن.
        </p>
      ) : (
        <div className="analysis-card__body">
          <p>
            از مجموع <strong>{insights.count}</strong> تریدِ بسته‌شده، جفت‌ارزِ{" "}
            <strong className="pos">{insights.bestPair[0]}</strong> بیشترین سود را داشته
            ({fmtMoney(insights.bestPair[1].pnl)})
            {insights.worstPair && insights.worstPair[0] !== insights.bestPair[0] && (
              <> و <strong className="neg">{insights.worstPair[0]}</strong> ضعیف‌ترین عملکرد را داشته ({fmtMoney(insights.worstPair[1].pnl)})</>
            )}.
          </p>
          {insights.buyWinRate !== null && insights.sellWinRate !== null && (
            <p>
              نرخ برد در پوزیشن‌های خرید <strong>{insights.buyWinRate.toFixed(0)}%</strong> و در پوزیشن‌های فروش{" "}
              <strong>{insights.sellWinRate.toFixed(0)}%</strong> بوده است.
              {insights.buyWinRate > insights.sellWinRate + 10
                ? " به نظر می‌رسد ستاپ‌های خریدت قوی‌تر عمل می‌کنند."
                : insights.sellWinRate > insights.buyWinRate + 10
                ? " به نظر می‌رسد ستاپ‌های فروشت قوی‌تر عمل می‌کنند."
                : ""}
            </p>
          )}
          <p className="analysis-card__note">
            این تحلیل بر اساس داده‌های ثبت‌شده‌ی توست و صرفاً جهت بازبینی عملکرد است، نه توصیه‌ی معاملاتی.
          </p>
        </div>
      )}
    </div>
  );
}

function SettingsBar({ balance, setBalance, goalPct, setGoalPct }) {
  const [open, setOpen] = useState(false);
  return (
    <div className="settings">
      <button className="settings__toggle" onClick={() => setOpen((o) => !o)}>
        تنظیمات
      </button>
      {open && (
        <div className="settings__panel card">
          <label className="field">
            <span>موجودی اولیه حساب (دلار)</span>
            <input
              type="number"
              step="any"
              value={balance}
              onChange={(e) => setBalance(Number(e.target.value) || 0)}
            />
          </label>
          <label className="field">
            <span>هدف رشد ماهانه (٪)</span>
            <input
              type="number"
              step="any"
              value={goalPct}
              onChange={(e) => setGoalPct(Number(e.target.value) || 0)}

          </label>
        </div>
      )}

  );
}

const TABS = [
  { key: "dashboard", label: "داشبورد", icon: Icon.dashboard },
  { key: "log", label: "ثبت ترید", icon: Icon.plus },
  { key: "list", label: "تریدها", icon: Icon.list },
  { key: "analysis", label: "تحلیل AI", icon: Icon.brain },
];

class ErrorBoundary extends React.Component {
  constructor(props) {
    super(props);
    this.state = { hasError: false, message: "" };
  }
  static getDerivedStateFromError(error) {
    return { hasError: true, message: error && error.message ? error.message : "خطای نامشخص" };
  }
  render() {
    if (this.state.hasError) {
      return (
        <div style={{
          background: "#0a0e14", color: "#e8edf6", minHeight: "100vh",
          display: "flex", alignItems: "center", justifyContent: "center",
          fontFamily: "Vazirmatn, sans-serif", direction: "rtl", padding: 24, textAlign: "center"
        }}>
          <div>
            <p style={{ fontSize: 16, marginBottom: 8 }}>یه خطا پیش اومد و صفحه متوقف شد.</p>
            <p style={{ fontSize: 13, color: "#8a96ab" }}>{this.state.message}</p>
            <button
              onClick={() => location.reload()}
              style={{
                marginTop: 16, background: "#35e3b0", color: "#04241b", border: "none",
                borderRadius: 10, padding: "10px 18px", fontWeight: 700, cursor: "pointer"
              }}
            >
              تلاش دوباره
            </button>
          </div>
        </div>
      );
    }
    return this.props.children;
  }
}

function App() {
  const { trades, loaded: tradesLoaded, error, addTrade, deleteTrade } = useTrades();
  const { balance, setBalance, goalPct, setGoalPct, loaded: settingsLoaded } = useSettings();
  const [tab, setTab] = useState("dashboard");
  const [storageOk, setStorageOk] = useState(true);

  useEffect(() => {
    setStorageOk(isStorageAvailable());
  }, []);

  const ready = tradesLoaded && settingsLoaded;

  return (
    <div className="app" dir="rtl">
      <style>{css}</style>

      <header className="header">
        <div className="header__brand">
          <span className="header__dot" />
          <span className="header__title">ژورنال فارکس</span>
        </div>
        <nav className="tabs">
          {TABS.map((t) => {
            const ActiveIcon = t.icon;
            return (
              <button
                key={t.key}
                className={`tabs__btn ${tab === t.key ? "tabs__btn--active" : ""}`}
                onClick={() => setTab(t.key)}
              >
                <ActiveIcon className="tabs__icon" />
                {t.label}
              </button>
            );
          })}
        </nav>
        <SettingsBar balance={balance} setBalance={setBalance} goalPct={goalPct} setGoalPct={setGoalPct} />
      </header>

      <main className="main">
        {!storageOk && (
          <div className="error-banner">
            ذخیره‌سازی در این مرورگر مسدود است (معمولاً به‌خاطر باز کردن فایل به‌صورت مستقیم). این فایل رو روی یه هاست واقعی مثل Netlify آپلود کن تا ثبت ترید درست کار کنه.
          </div>
        )}
        {!ready ? (
          <div className="loading">در حال بارگذاری اطلاعات…</div>
        ) : (
          <>
            {error && <div className="error-banner">{error}</div>}
            {tab === "dashboard" && <Dashboard trades={trades} balance={balance} goalPct={goalPct} />}
            {tab === "log" && <TradeForm onSubmit={addTrade} />}
            {tab === "list" && <TradeList trades={trades} onDelete={deleteTrade} />}
            {tab === "analysis" && <Analysis trades={trades} />}
          </>
        )}
      </main>
    </div>
  );
}
